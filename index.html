<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026 🏆</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #141929;
    --surface2: #1e2640;
    --accent: #e63946;
    --gold: #f4a100;
    --green: #2dc653;
    --yellow: #f4c430;
    --text: #e8eaf0;
    --muted: #8891ab;
    --border: #2a3150;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #141929 0%, #1e2640 100%);
    border-bottom: 2px solid var(--accent);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
  .flag { font-size: 2rem; }
  .updated { margin-left: auto; font-size: 0.75rem; color: var(--muted); text-align: right; line-height: 1.5; }
  .updated strong { display: block; color: var(--text); font-size: 0.8rem; }

  .leaderboard {
    margin: 24px auto;
    max-width: 900px;
    padding: 0 16px;
  }
  .section-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .lb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .lb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    text-align: center;
    position: relative;
    transition: border-color 0.2s;
  }
  .lb-card.rank-1 { border-color: var(--gold); }
  .lb-card.rank-2 { border-color: #aaa; }
  .lb-card.rank-3 { border-color: #cd7f32; }
  .lb-card .rank { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
  .lb-card .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .lb-card .points { font-size: 2rem; font-weight: 800; color: var(--gold); }
  .lb-card .pts-label { font-size: 0.7rem; color: var(--muted); }
  .lb-card .badge { font-size: 1.4rem; position: absolute; top: 10px; right: 12px; }
  .lb-card .champion-pick { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
  .lb-card .no-picks { font-size: 0.8rem; color: var(--muted); font-style: italic; }

  nav {
    display: flex; gap: 4px; flex-wrap: wrap;
    padding: 0 16px;
    max-width: 900px;
    margin: 0 auto 20px;
  }
  nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 7px 14px;
    transition: all 0.15s;
  }
  nav button:hover { border-color: var(--accent); color: var(--text); }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .content { max-width: 900px; margin: 0 auto; padding: 0 16px 48px; }

  .group-section { margin-bottom: 32px; }
  .group-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .group-tag {
    background: var(--accent);
    border-radius: 6px;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    letter-spacing: 0.05em;
  }

  /* Points legend */
  .pts-legend {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    font-size: 0.7rem; color: var(--muted); padding: 6px 2px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .legend-dot.exact { background: rgba(45, 198, 83, 0.3); border: 1px solid var(--green); }
  .legend-dot.result { background: transparent; border: 1px solid var(--green); position: relative; }
  .legend-dot.result::after { content: "•"; color: var(--green); font-size: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .legend-special { color: var(--yellow); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 8px 12px;
    text-align: left;
    text-transform: uppercase;
  }
  thead th:not(:first-child) { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--surface); }
  tbody tr.special-row { background: rgba(244, 196, 48, 0.06); }
  tbody tr.special-row:hover { background: rgba(244, 196, 48, 0.1); }
  td { padding: 10px 12px; font-size: 0.85rem; }
  .match-teams { color: var(--text); font-weight: 500; }
  .match-teams .vs { color: var(--muted); font-size: 0.75rem; margin: 0 4px; }
  .match-label { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }
  .date-chip {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.65rem;
    padding: 1px 6px;
    margin-left: 6px;
    white-space: nowrap;
    vertical-align: middle;
    font-weight: 500;
  }
  .special-badge { font-size: 0.65rem; color: var(--yellow); margin-left: 4px; }
  .result-cell { text-align: center; }
  .score-box {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 60px;
  }
  .score { font-weight: 700; font-size: 0.9rem; padding: 2px 6px; border-radius: 4px; }
  .score.exact { background: rgba(45, 198, 83, 0.2); color: var(--green); }
  .score.result-only { position: relative; }
  .score.result-only::before { content: "●"; color: var(--green); font-size: 0.5rem; vertical-align: middle; margin-right: 3px; }
  .pts-badge {
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
  }
  .pts-earned { color: var(--green); font-size: 0.7rem; font-weight: 600; }
  .pts-3 { background: #1a4a2a; color: var(--green); }
  .pts-2 { background: #3a3010; color: var(--yellow); }
  .pts-1 { background: #2a1a1a; color: #e05050; }
  .pts-0 { background: transparent; color: var(--muted); }
  .real-score { font-size: 0.8rem; text-align: center; }
  .real-score.pending { color: var(--muted); font-style: italic; }
  .real-score.finished { font-weight: 700; color: var(--text); }
  .no-picks-cell { color: var(--muted); font-style: italic; font-size: 0.8rem; text-align: center; }

  /* Live game animation */
  @keyframes blink-live {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }
  .live-score {
    color: var(--accent) !important;
    font-weight: 700;
    animation: blink-live 2s ease-in-out infinite;
  }
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 4px;
    animation: blink-live 1.2s ease-in-out infinite;
    vertical-align: middle;
  }

  .ko-table { margin-bottom: 24px; }
  .ko-match-row td:first-child { width: 210px; }
  .bracket-label { font-size: 0.78rem; font-weight: 600; color: var(--text); }
  .bracket-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .ko-fixture { font-size: 0.78rem; margin-top: 3px; display: flex; align-items: center; gap: 4px; justify-content: center; flex-wrap: wrap; }
  .ko-team { padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
  .ko-team.pick-winner { color: var(--yellow); font-weight: 700; }
  .ko-team.pick-loser  { color: var(--muted); }
  .ko-team.correct     { background: rgba(45,198,83,0.15); color: var(--green); font-weight: 700; }
  .ko-team.wrong-pick  { background: rgba(230,57,70,0.15); color: var(--accent); font-weight: 700; }
  .ko-team.wrong-team  { color: var(--muted); }

  .extras-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .extra-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .extra-card .extra-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .extra-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 0.85rem; }
  .extra-row .p-name { color: var(--muted); font-size: 0.75rem; }
  .extra-row .p-pick { font-weight: 600; }
  .extra-row .no-pick { color: var(--muted); font-style: italic; font-size: 0.75rem; }
  .extra-pts { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
  .extra-pts.correct { background: #1a4a2a; color: var(--green); }
  .extra-pts.wrong { background: #2a1a1a; color: #e05050; }
  .extra-pts.pending { background: var(--surface2); color: var(--muted); }

  /* Standings */
  .standings-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin: 18px 0 8px; padding-left: 2px;
  }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table thead th {
    background: #11162a;
    color: var(--muted); font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.08em; padding: 7px 12px;
    text-align: left; text-transform: uppercase;
  }
  .standings-table thead th.center { text-align: center; }
  .standings-table tbody tr { border-bottom: 1px solid var(--border); }
  .standings-table tbody tr:hover { background: var(--surface); }
  .standings-table td { padding: 8px 12px; font-size: 0.83rem; vertical-align: middle; }
  .pos-col { width: 36px; text-align: center; }
  .pos-num {
    background: var(--surface2); border-radius: 4px;
    font-size: 0.73rem; font-weight: 700; padding: 2px 7px;
    display: inline-block;
  }
  .std-real { display: flex; align-items: center; gap: 7px; }
  .std-pts {
    background: var(--surface2); border-radius: 4px;
    color: var(--gold); font-size: 0.65rem; font-weight: 700;
    padding: 1px 5px; white-space: nowrap;
  }
  .std-pts.partial { color: var(--yellow); }
  .std-pts.empty { color: var(--muted); }
  .std-participant { text-align: center; }
  .std-participant .team-inner { display: inline-block; font-size: 0.8rem; }
  .std-correct { color: var(--green); font-weight: 600; }
  .std-wrong   { color: var(--accent); }
  .std-pending { color: var(--text); }
  .std-none    { color: var(--muted); font-style: italic; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }
  .error-msg { background: #2a1010; border: 1px solid #5a2020; border-radius: 8px; color: #e05050; margin: 20px 0; padding: 14px 18px; font-size: 0.85rem; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.1rem; }
    thead th, td { padding: 6px 8px; font-size: 0.78rem; }
    .score-box { min-width: 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="flag">🏆</div>
  <div>
    <h1>Porra Mundial USA·MEX·CAN 2026</h1>
    <div class="subtitle">Marc · Eugènia · Berta · José Luis</div>
  </div>
  <div class="updated" id="lastUpdated">
    <span>Última actualización</span>
    <strong id="lastUpdatedTime">Cargando...</strong>
  </div>
</header>

<div class="leaderboard" id="leaderboard">
  <div class="section-title">Clasificación</div>
  <div class="lb-grid" id="lbGrid"><div class="loading">Calculando puntos...</div></div>
</div>

<nav id="stageNav"></nav>
<div class="content" id="content"><div class="loading">Cargando datos...</div></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PARTICIPANTS = ["Berta", "Marc", "Eugènia", "José Luis"];
const PICKS_FILES  = {
  "Berta":     "data/picks/berta.json",
  "Marc":      "data/picks/marc.json",
  "Eugènia":   "data/picks/eugenia.json",
  "José Luis": "data/picks/jose_luis.json",
};
const RESULTS_FILE  = "data/results.json";
const SCHEDULE_FILE = "data/schedule.json";

const STAGES = [
  { key: "group",        label: "Fase de Grupos" },
  { key: "Round of 32",  label: "Dieciseisavos" },
  { key: "Round of 16",  label: "Octavos" },
  { key: "Quarter-final",label: "Cuartos" },
  { key: "Semi-final",   label: "Semifinales" },
  { key: "Final",        label: "Final" },
  { key: "extras",       label: "Extras" },
];

// Knockout stage point info (shown below the stage chip)
const KO_STAGE_INFO = {
  "Round of 32":   { label: "5 puntos",  desc: "Acertar ganador: 3pts · Marcador exacto: 2pts extra", winnerPts: 3,  max: 5  },
  "Round of 16":   { label: "10 puntos", desc: "Acertar ganador: 7pts · Marcador exacto: 3pts extra", winnerPts: 7,  max: 10 },
  "Quarter-final": { label: "15 puntos", desc: "Acertar ganador: 11pts · Marcador exacto: 4pts extra", winnerPts: 11, max: 15 },
  "Semi-final":    { label: "25 puntos", desc: "Acertar ganador: 20pts · Marcador exacto: 5pts extra", winnerPts: 20, max: 25 },
  "Third place":   { label: "15 puntos", desc: "Acertar ganador: 11pts · Marcador exacto: 4pts extra", winnerPts: 11, max: 15 },
  "Final":         { label: "50 puntos", desc: "Acertar ganador: 40pts · Marcador exacto: 10pts extra", winnerPts: 40, max: 50 },
};

// Official WC 2026 bracket slot labels
const BRACKET_LABELS = {
  "R32-1":  "2º Grupo A vs 2º Grupo B",
  "R32-2":  "1º Grupo E vs Mejor 3º (A/B/C/D/F)",
  "R32-3":  "1º Grupo F vs 2º Grupo C",
  "R32-4":  "1º Grupo C vs 2º Grupo F",
  "R32-5":  "1º Grupo I vs Mejor 3º (C/D/F/G/H)",
  "R32-6":  "2º Grupo E vs 2º Grupo I",
  "R32-7":  "1º Grupo A vs Mejor 3º (C/E/F/H/I)",
  "R32-8":  "1º Grupo L vs Mejor 3º (E/H/I/J/K)",
  "R32-9":  "1º Grupo D vs Mejor 3º (B/E/F/I/J)",
  "R32-10": "1º Grupo G vs Mejor 3º (A/E/H/I/J)",
  "R32-11": "2º Grupo K vs 2º Grupo L",
  "R32-12": "1º Grupo H vs 2º Grupo J",
  "R32-13": "1º Grupo B vs Mejor 3º (E/F/G/I/J)",
  "R32-14": "1º Grupo J vs 2º Grupo H",
  "R32-15": "1º Grupo K vs Mejor 3º (D/E/I/J/L)",
  "R32-16": "2º Grupo D vs 2º Grupo G",
  "R16-1":  "W(R32-2) vs W(R32-5)",
  "R16-2":  "W(R32-1) vs W(R32-3)",
  "R16-3":  "W(R32-4) vs W(R32-6)",
  "R16-4":  "W(R32-7) vs W(R32-8)",
  "R16-5":  "W(R32-11) vs W(R32-12)",
  "R16-6":  "W(R32-9) vs W(R32-10)",
  "R16-7":  "W(R32-14) vs W(R32-16)",
  "R16-8":  "W(R32-13) vs W(R32-15)",
  "QF-1":   "W(R16-1) vs W(R16-2)",
  "QF-2":   "W(R16-5) vs W(R16-6)",
  "QF-3":   "W(R16-3) vs W(R16-4)",
  "QF-4":   "W(R16-7) vs W(R16-8)",
  "SF-1":   "W(QF-1) vs W(QF-3)",
  "SF-2":   "W(QF-2) vs W(QF-4)",
  "3rd":    "Tercer puesto",
  "Final":  "Gran Final",
};

// Special 6-point matches
const SPECIAL_MATCH_IDS = new Set([
  "GA4","GB1","GC1","GD3","GE2","GF5","GG1","GH6","GI5","GJ3","GK5","GL1"
]);

// ── State ────────────────────────────────────────────────────────────────────
let picksData  = {};
let results    = { matches: [] };
let schedule   = {};   // matchId → utc_date string
let activeStage = "group";

// ── Load data ────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return r.json();
  } catch { return null; }
}

async function init() {
  const sched = await fetchJSON(SCHEDULE_FILE);
  if (sched?.matches) schedule = sched.matches;

  const res = await fetchJSON(RESULTS_FILE);
  if (res) results = res;

  for (const p of PARTICIPANTS) {
    const data = await fetchJSON(PICKS_FILES[p]);
    if (data) picksData[p] = data;
  }

  renderLeaderboard();
  buildNav();
  renderStage(activeStage);

  const timeEl = document.getElementById("lastUpdatedTime");
  if (results.last_updated) {
    timeEl.textContent = new Date(results.last_updated).toLocaleString("es-ES", {
      timeZone: "Europe/Madrid", dateStyle: "short", timeStyle: "short"
    });
  } else {
    timeEl.textContent = "Sin resultados aún";
  }
}

// ── Date formatting ──────────────────────────────────────────────────────────
function fmtDate(utcDate) {
  if (!utcDate) return "";
  const d = new Date(utcDate);
  const day  = d.toLocaleDateString("es-ES", { timeZone: "Europe/Madrid", day: "numeric", month: "short" });
  const time = d.toLocaleTimeString("es-ES", { timeZone: "Europe/Madrid", hour: "2-digit", minute: "2-digit" });
  return `${day} · ${time}`;
}

function matchDate(matchId, result) {
  return result?.utc_date || schedule[matchId] || null;
}

// ── Results lookup ───────────────────────────────────────────────────────────
function findResult(homeEs, awayEs) {
  return results.matches.find(m =>
    (m.home_team_es === homeEs && m.away_team_es === awayEs) ||
    (m.home_team_es === awayEs && m.away_team_es === homeEs)
  ) || null;
}

// ── Scoring ──────────────────────────────────────────────────────────────────
function scoreGroupMatch(pick, result, matchId) {
  if (!result || result.status !== "FINISHED" || result.home_goals === null) return null;

  const isSpecial = SPECIAL_MATCH_IDS.has(matchId);
  const [ph, pa] = [pick.predicted_home, pick.predicted_away];
  let [rh, ra] = [result.home_goals, result.away_goals];

  if (result.home_team_es === pick.away_team) [rh, ra] = [ra, rh];

  const correctScore  = ph === rh && pa === ra;
  const correctResult = Math.sign(ph - pa) === Math.sign(rh - ra);

  if (isSpecial) {
    if (correctScore)  return 6; // 3pts (1X2) + 3pts (marcador) = 6 total
    if (correctResult) return 3; // 3pts for 1X2 only
    return 0;
  } else {
    if (correctScore)  return 3;
    if (correctResult) return 1;
    return 0;
  }
}

// Standings scoring: 4pts exact position, 1pt adjacent (1↔2 or 3↔4)
function scoreStandingsPosition(predictedTeam, realStandings, predictedPos) {
  if (!predictedTeam || !realStandings.length) return null;
  const realPos = realStandings.findIndex(t => t.name === predictedTeam);
  if (realPos === -1) return null; // not all games played yet
  if (realPos === predictedPos) return 4;
  const adjacent = predictedPos % 2 === 0 ? predictedPos + 1 : predictedPos - 1;
  if (realPos === adjacent) return 1;
  return 0;
}

function scoreKnockoutMatch(pick, result) {
  if (!result || result.status !== "FINISHED" || !result.winner_es) return null;
  if (result.winner_es !== pick.predicted_winner) return 0;

  // Check exact score for bonus points
  const [ph, pa] = [pick.predicted_home, pick.predicted_away];
  let [rh, ra] = [result.home_goals, result.away_goals];
  if (result.home_team_es === pick.away_team) [rh, ra] = [ra, rh];
  const exactScore = ph !== null && pa !== null && ph === rh && pa === ra;

  if (exactScore) return pick.max_points;
  const info = KO_STAGE_INFO[pick.stage];
  return info ? info.winnerPts : pick.max_points;
}

function calcTotalPoints(participant) {
  const picks = picksData[participant];
  if (!picks) return null;
  let total = 0;

  for (const m of picks.group_matches) {
    const r = findResult(m.home_team, m.away_team);
    const pts = scoreGroupMatch(m, r, m.match_id);
    if (pts !== null) total += pts;
  }
  for (const m of picks.knockout_matches) {
    const r = findResult(m.home_team, m.away_team);
    const pts = scoreKnockoutMatch(m, r);
    if (pts !== null) total += pts;
  }

  // Standings scoring per group
  const ref = picksData["Berta"] || Object.values(picksData)[0];
  if (ref) {
    const groups = {};
    for (const m of ref.group_matches) {
      if (!groups[m.group]) groups[m.group] = [];
      groups[m.group].push(m);
    }
    for (const groupMatches of Object.values(groups)) {
      const realMatchList = groupMatches.map(m => {
        const r = findResult(m.home_team, m.away_team);
        if (r && r.home_team_es === m.away_team)
          return { home_team: m.home_team, away_team: m.away_team, home_goals: r.away_goals, away_goals: r.home_goals };
        return { home_team: m.home_team, away_team: m.away_team, home_goals: r?.home_goals ?? null, away_goals: r?.away_goals ?? null };
      });
      const finished = realMatchList.filter(m => m.home_goals !== null).length;
      if (finished < 6) continue; // only score when group is complete
      const realStandings = calculateStandings(realMatchList);
      const pMatches = groupMatches.map(m => {
        const pm = picks.group_matches.find(pm => pm.match_id === m.match_id);
        return pm
          ? { home_team: pm.home_team, away_team: pm.away_team, home_goals: pm.predicted_home, away_goals: pm.predicted_away }
          : { home_team: m.home_team, away_team: m.away_team, home_goals: null, away_goals: null };
      });
      const pStandings = calculateStandings(pMatches);
      for (let i = 0; i < 4; i++) {
        const pts = scoreStandingsPosition(pStandings[i]?.name, realStandings, i);
        if (pts !== null) total += pts;
      }
    }
  }

  return total;
}

// ── Leaderboard ──────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const ranked = PARTICIPANTS
    .map(p => ({ name: p, pts: calcTotalPoints(p), hasPicks: !!picksData[p] }))
    .sort((a, b) => (b.pts ?? -1) - (a.pts ?? -1));

  const medals = ["🥇", "🥈", "🥉", ""];
  const grid = document.getElementById("lbGrid");
  grid.innerHTML = ranked.map((p, i) => {
    const champion = picksData[p.name]?.champion ?? null;
    return `
    <div class="lb-card ${p.hasPicks ? `rank-${i+1}` : ""}">
      <div class="badge">${medals[Math.min(i, 3)]}</div>
      <div class="rank">#${i+1}</div>
      <div class="name">${p.name}</div>
      ${p.hasPicks
        ? `<div class="points">${p.pts}</div><div class="pts-label">puntos</div>
           ${champion ? `<div class="champion-pick">🏆 ${champion}</div>` : ""}`
        : `<div class="no-picks">Sin picks aún</div>`
      }
    </div>`;
  }).join("");
}

// ── Navigation ───────────────────────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById("stageNav");
  nav.innerHTML = STAGES.map(s =>
    `<button onclick="renderStage('${s.key}')" id="nav-${s.key}">${s.label}</button>`
  ).join("");
  document.getElementById(`nav-${activeStage}`)?.classList.add("active");
}

function setActive(key) {
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(`nav-${key}`)?.classList.add("active");
  activeStage = key;
}

// ── Render stages ─────────────────────────────────────────────────────────────
function renderStage(stage) {
  setActive(stage);
  const content = document.getElementById("content");

  if (stage === "extras") { content.innerHTML = renderExtras(); return; }
  if (stage === "group")  { content.innerHTML = renderGroupStage(); return; }

  // Knockout stage
  const allMatches = [];
  for (const p of PARTICIPANTS) {
    if (picksData[p]) {
      picksData[p].knockout_matches
        .filter(m => m.stage === stage)
        .forEach(m => allMatches.push({ participant: p, match: m }));
    }
  }

  // Group by match_id, keep insertion order
  const byId = {};
  const idOrder = [];
  for (const { participant, match } of allMatches) {
    if (!byId[match.match_id]) { byId[match.match_id] = { match, picks: {} }; idOrder.push(match.match_id); }
    byId[match.match_id].picks[participant] = match;
  }

  const stageLabel = STAGES.find(s => s.key === stage)?.label || stage;
  const stageInfo  = KO_STAGE_INFO[stage] ?? null;
  let html = `<div class="group-section">
    <div class="group-header"><span class="group-tag">${stageLabel}</span></div>
    ${stageInfo ? `<div class="pts-legend" style="margin-bottom:10px">
      <span style="color:var(--gold);font-weight:600">${stageInfo.label}</span>
      <span style="color:var(--muted)">·</span>
      <span>${stageInfo.desc}</span>
    </div>` : ""}`;
  html += `<table class="ko-table"><thead><tr>
    <th>Partido</th>
    <th>Real</th>
    ${PARTICIPANTS.map(p => `<th>${p}</th>`).join("")}
  </tr></thead><tbody>`;

  for (const mid of idOrder) {
    const { match, picks } = byId[mid];
    const result = findResult(match.home_team, match.away_team);
    const bracketLabel = BRACKET_LABELS[mid] || mid;

    // Real result cell
    let realCell;
    if (result?.status === "FINISHED") {
      realCell = `<td class="real-score finished">${result.home_goals}-${result.away_goals}<br><small>${result.winner_es}</small></td>`;
    } else if (result?.status === "IN_PLAY" || result?.status === "PAUSED") {
      realCell = `<td class="real-score"><span class="live-dot"></span><span class="live-score">${result.home_goals ?? 0}-${result.away_goals ?? 0}</span></td>`;
    } else {
      realCell = `<td class="real-score pending">—</td>`;
    }

    const koDateStr = fmtDate(matchDate(mid, result));
    html += `<tr class="ko-match-row"><td>
      <div class="bracket-label">${bracketLabel}${koDateStr ? ` <span class="date-chip">${koDateStr}</span>` : ""}</div>
    </td>${realCell}`;

    for (const p of PARTICIPANTS) {
      const pm = picks[p];
      if (!pm) { html += `<td class="no-picks-cell">—</td>`; continue; }
      const pts = scoreKnockoutMatch(pm, result);
      const finished = result?.status === "FINISHED";

      // Determine CSS class for each team
      // predicted_winner may be set even on tied scores (penalties pick)
      const isTiedPrediction = pm.predicted_home !== null && pm.predicted_away !== null
                               && pm.predicted_home === pm.predicted_away;
      function koTeamClass(team) {
        const isPick = pm.predicted_winner
          ? team === pm.predicted_winner
          : isTiedPrediction && team === pm.home_team; // fallback: highlight home if no explicit winner
        if (!finished) return isPick ? "pick-winner" : "pick-loser";
        if (isPick) return pts > 0 ? "correct" : "wrong-pick";
        return "wrong-team";
      }

      const homeTeam = pm.home_team || "?";
      const awayTeam = pm.away_team || "?";

      const isTied = pm.predicted_home !== null && pm.predicted_home === pm.predicted_away;
      const hp = pm.predicted_home_pens, ap = pm.predicted_away_pens;
      const scoreDisplay = isTied && hp != null && ap != null
        ? `<span style="color:var(--yellow);font-size:0.75rem">${hp}</span> <span class="score">${pm.predicted_home}-${pm.predicted_away}</span> <span style="color:var(--yellow);font-size:0.75rem">${ap}</span>`
        : `<span class="score">${pm.predicted_home ?? "?"}-${pm.predicted_away ?? "?"}</span>`;

      html += `<td class="result-cell"><div class="score-box">
        <div style="display:flex;align-items:center;gap:4px;justify-content:center">${scoreDisplay}</div>
        <div class="ko-fixture">
          <span class="ko-team ${koTeamClass(homeTeam)}">${homeTeam}</span>
          <span style="color:var(--muted);font-size:0.7rem">vs</span>
          <span class="ko-team ${koTeamClass(awayTeam)}">${awayTeam}</span>
        </div>
        ${pts !== null ? `<span class="pts-earned">${pts > 0 ? "+" : ""}${pts}pts</span>` : ""}
      </div></td>`;
    }

    html += `</tr>`;
  }

  html += `</tbody></table></div>`;
  content.innerHTML = html;
}

// ── Group standings ───────────────────────────────────────────────────────────
function calculateStandings(matchList) {
  const teams = {};
  for (const m of matchList) {
    if (!teams[m.home_team]) teams[m.home_team] = { name: m.home_team, pts: 0, gf: 0, gc: 0, played: 0 };
    if (!teams[m.away_team]) teams[m.away_team] = { name: m.away_team, pts: 0, gf: 0, gc: 0, played: 0 };
    const hg = m.home_goals, ag = m.away_goals;
    if (hg === null || hg === undefined || ag === null || ag === undefined) continue;
    const h = teams[m.home_team], a = teams[m.away_team];
    h.played++; a.played++;
    h.gf += hg; h.gc += ag;
    a.gf += ag; a.gc += hg;
    if (hg > ag) h.pts += 3;
    else if (ag > hg) a.pts += 3;
    else { h.pts += 1; a.pts += 1; }
  }
  return Object.values(teams).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const dg = (b.gf - b.gc) - (a.gf - a.gc);
    if (dg !== 0) return dg;
    return b.gf - a.gf;
  });
}

function renderGroupStandings(baseMatches) {
  const realMatchList = baseMatches.map(m => {
    const r = findResult(m.home_team, m.away_team);
    if (r && r.home_team_es === m.away_team) {
      return { home_team: m.home_team, away_team: m.away_team, home_goals: r.away_goals, away_goals: r.home_goals };
    }
    return { home_team: m.home_team, away_team: m.away_team, home_goals: r?.home_goals ?? null, away_goals: r?.away_goals ?? null };
  });

  const finishedCount = realMatchList.filter(m => m.home_goals !== null).length;
  const allDone = finishedCount === 6;
  const realStandings = calculateStandings(realMatchList);

  const participantStandings = {};
  for (const p of PARTICIPANTS) {
    const picks = picksData[p];
    if (!picks) { participantStandings[p] = null; continue; }
    const pList = baseMatches.map(m => {
      const pm = picks.group_matches.find(pm => pm.match_id === m.match_id);
      return pm
        ? { home_team: pm.home_team, away_team: pm.away_team, home_goals: pm.predicted_home, away_goals: pm.predicted_away }
        : { home_team: m.home_team, away_team: m.away_team, home_goals: null, away_goals: null };
    });
    participantStandings[p] = calculateStandings(pList);
  }

  // Scoring legend for standings
  let html = `<div class="standings-label">Clasificación del grupo</div>
  <div class="pts-legend" style="margin-bottom:8px">
    <span class="legend-item"><span class="legend-dot exact"></span> Posición exacta: 4pts</span>
    <span class="legend-item"><span class="legend-dot result"></span> Posición adyacente (1↔2 o 3↔4): 1pt</span>
  </div>
  <table class="standings-table"><thead><tr>
    <th class="pos-col">Pos</th>
    <th>Clasificación real${finishedCount > 0 && !allDone ? " *parcial" : ""}</th>
    ${PARTICIPANTS.map(p => `<th class="center">${p}</th>`).join("")}
  </tr></thead><tbody>`;

  for (let i = 0; i < 4; i++) {
    const realTeam = realStandings[i];
    html += `<tr>`;
    html += `<td class="pos-col"><span class="pos-num">${i+1}</span></td>`;
    html += `<td><div class="std-real">
      <span>${realTeam?.name ?? "—"}</span>
      ${finishedCount > 0 && realTeam
        ? `<span class="std-pts ${allDone ? "" : "partial"}">${realTeam.pts}pts</span>`
        : `<span class="std-pts empty">—</span>`}
    </div></td>`;

    for (const p of PARTICIPANTS) {
      const pStandings = participantStandings[p];
      if (!pStandings) { html += `<td class="std-participant"><span class="std-none">—</span></td>`; continue; }
      const pTeam = pStandings[i];
      const standPts = allDone ? scoreStandingsPosition(pTeam?.name, realStandings, i) : null;
      const correct = standPts === 4;
      const partial = standPts === 1;
      const wrong   = standPts === 0;
      const cls = correct ? "std-correct" : partial ? "std-pending" : wrong ? "std-wrong" : "std-pending";
      html += `<td class="std-participant">
        <span class="team-inner ${cls}">${pTeam?.name ?? "?"}</span>
        ${standPts !== null ? `<br><span class="pts-earned">${standPts > 0 ? "+" : ""}${standPts}pts</span>` : ""}
      </td>`;
    }

    html += `</tr>`;
  }

  html += `</tbody></table>`;
  return html;
}

function renderGroupStage() {
  const ref = picksData["Berta"] || Object.values(picksData)[0];
  if (!ref) return `<div class="error-msg">No hay picks disponibles todavía.</div>`;

  const groups = {};
  for (const m of ref.group_matches) {
    if (!groups[m.group]) groups[m.group] = [];
    groups[m.group].push(m);
  }

  let html = "";
  for (const [g, matches] of Object.entries(groups)) {
    const hasSpecial = matches.some(m => SPECIAL_MATCH_IDS.has(m.match_id));

    html += `<div class="group-section">
    <div class="group-header"><span class="group-tag">Grupo ${g}</span></div>`;

    // Legend below group tag
    html += `<div class="pts-legend">
      <span class="legend-item"><span class="legend-dot exact"></span> Marcador exacto: 3pts</span>
      <span class="legend-item"><span class="legend-dot result"></span> Acertar 1X2: 1pt</span>
      ${hasSpecial ? `<span class="legend-special">⭐ Partido especial - 6 puntos (Marcador exacto: 3pts · Acertar 1X2: 3pts)</span>` : ""}
    </div>`;

    html += `<table><thead><tr>
      <th>Partido</th>
      <th>Real</th>
      ${PARTICIPANTS.map(p => `<th>${p}</th>`).join("")}
    </tr></thead><tbody>`;

    for (const baseMatch of matches) {
      const isSpecial = SPECIAL_MATCH_IDS.has(baseMatch.match_id);
      const result = findResult(baseMatch.home_team, baseMatch.away_team);

      // Real score cell
      let realCell;
      if (result?.status === "FINISHED") {
        realCell = `<td class="real-score finished">${result.home_goals}-${result.away_goals}</td>`;
      } else if (result?.status === "IN_PLAY" || result?.status === "PAUSED") {
        realCell = `<td class="real-score"><span class="live-dot"></span><span class="live-score">${result.home_goals ?? 0}-${result.away_goals ?? 0}</span></td>`;
      } else {
        realCell = `<td class="real-score pending">—</td>`;
      }

      const dateStr = fmtDate(matchDate(baseMatch.match_id, result));
      html += `<tr class="${isSpecial ? "special-row" : ""}">
        <td class="match-teams">
          ${baseMatch.home_team} <span class="vs">vs</span> ${baseMatch.away_team}
          ${isSpecial ? `<span class="special-badge">⭐</span>` : ""}
          ${dateStr ? `<span class="date-chip">${dateStr}</span>` : ""}
        </td>${realCell}`;

      for (const p of PARTICIPANTS) {
        const pm = picksData[p]?.group_matches?.find(m => m.match_id === baseMatch.match_id);
        if (!pm) { html += `<td class="no-picks-cell">—</td>`; continue; }

        const pts = scoreGroupMatch(pm, result, baseMatch.match_id);
        const maxPts = isSpecial ? 6 : 3;

        // Determine score class
        let scoreClass = "";
        if (pts !== null) {
          if (pts === maxPts) scoreClass = "exact";
          else if (pts > 0) scoreClass = "result-only";
        }

        html += `<td class="result-cell"><div class="score-box">
          <span class="score ${scoreClass}">${pm.predicted_home ?? "?"}-${pm.predicted_away ?? "?"}</span>
          ${pts !== null ? `<span class="pts-earned">${pts > 0 ? "+" : ""}${pts}pts</span>` : ""}
        </div></td>`;
      }

      html += `</tr>`;
    }

    html += `</tbody></table>`;
    html += renderGroupStandings(matches);
    html += `</div>`;
  }
  return html;
}

function renderExtras() {
  const extraItems = [
    { key: "bota_oro",     label: "⚽ Bota de Oro",     subtitle: "Máximo goleador" },
    { key: "bota_plata",   label: "⚽ Bota de Plata",   subtitle: "2º máximo goleador" },
    { key: "bota_bronce",  label: "⚽ Bota de Bronce",  subtitle: "3º máximo goleador" },
    { key: "balon_oro",    label: "🌟 Balón de Oro",    subtitle: "Mejor jugador" },
    { key: "balon_plata",  label: "🌟 Balón de Plata",  subtitle: "2º mejor jugador" },
    { key: "balon_bronce", label: "🌟 Balón de Bronce", subtitle: "3º mejor jugador" },
  ];

  let html = `<div class="group-section">
    <div class="group-header"><span class="group-tag">Premios individuales</span></div>
    <div class="pts-legend" style="margin-bottom:10px">
      <span style="color:var(--gold);font-weight:600">10 puntos por extra acertado</span>
    </div>
  <div class="extras-grid">`;

  for (const item of extraItems) {
    // Real winner from results.json (manually added as results.extras.balon_oro etc.)
    const realWinner = results.extras?.[item.key] ?? null;

    html += `<div class="extra-card">
      <div class="extra-label">${item.label}</div>
      <div style="font-size:0.7rem;color:var(--muted);margin-bottom:10px">${item.subtitle}${realWinner ? ` · <span style="color:var(--gold)">${realWinner}</span>` : " · por decidir"}</div>`;

    for (const p of PARTICIPANTS) {
      const pick = picksData[p]?.extras?.[item.key];
      if (!pick) {
        html += `<div class="extra-row"><span class="p-name">${p}</span><span class="no-pick">Sin pick</span></div>`;
        continue;
      }
      const correct = realWinner && pick.trim().toLowerCase() === realWinner.trim().toLowerCase();
      const decided = realWinner !== null;
      html += `<div class="extra-row">
        <span class="p-name">${p}</span>
        <span class="p-pick" style="${correct ? "color:var(--green);font-weight:700" : decided ? "color:var(--muted)" : "color:var(--text)"}">${pick}</span>
        ${correct ? `<span class="extra-pts correct">+10pts</span>` : ""}
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

init();

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026 🏆</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #141929;
    --surface2: #1e2640;
    --accent: #e63946;
    --gold: #f4a100;
    --green: #2dc653;
    --yellow: #f4c430;
    --text: #e8eaf0;
    --muted: #8891ab;
    --border: #2a3150;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #141929 0%, #1e2640 100%);
    border-bottom: 2px solid var(--accent);
    padding: 20px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header .subtitle { color: var(--muted); font-size: 0.85rem; margin-top: 2px; }
  .flag { font-size: 2rem; }
  .updated { margin-left: auto; font-size: 0.75rem; color: var(--muted); text-align: right; line-height: 1.5; }
  .updated strong { display: block; color: var(--text); font-size: 0.8rem; }

  .leaderboard {
    margin: 24px auto;
    max-width: 900px;
    padding: 0 16px;
  }
  .section-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .lb-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .lb-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    text-align: center;
    position: relative;
    transition: border-color 0.2s;
  }
  .lb-card.rank-1 { border-color: var(--gold); }
  .lb-card.rank-2 { border-color: #aaa; }
  .lb-card.rank-3 { border-color: #cd7f32; }
  .lb-card .rank { font-size: 0.7rem; color: var(--muted); margin-bottom: 4px; }
  .lb-card .name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .lb-card .points { font-size: 2rem; font-weight: 800; color: var(--gold); }
  .lb-card .pts-label { font-size: 0.7rem; color: var(--muted); }
  .lb-card .badge { font-size: 1.4rem; position: absolute; top: 10px; right: 12px; }
  .lb-card .champion-pick { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }
  .lb-card .no-picks { font-size: 0.8rem; color: var(--muted); font-style: italic; }

  nav {
    display: flex; gap: 4px; flex-wrap: wrap;
    padding: 0 16px;
    max-width: 900px;
    margin: 0 auto 20px;
  }
  nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 7px 14px;
    transition: all 0.15s;
  }
  nav button:hover { border-color: var(--accent); color: var(--text); }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

  .content { max-width: 900px; margin: 0 auto; padding: 0 16px 48px; }

  .group-section { margin-bottom: 32px; }
  .group-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .group-tag {
    background: var(--accent);
    border-radius: 6px;
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 10px;
    letter-spacing: 0.05em;
  }

  /* Points legend */
  .pts-legend {
    display: flex; gap: 14px; flex-wrap: wrap; align-items: center;
    font-size: 0.7rem; color: var(--muted); padding: 6px 2px;
  }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .legend-dot.exact { background: rgba(45, 198, 83, 0.3); border: 1px solid var(--green); }
  .legend-dot.result { background: transparent; border: 1px solid var(--green); position: relative; }
  .legend-dot.result::after { content: "•"; color: var(--green); font-size: 8px; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .legend-special { color: var(--yellow); font-weight: 600; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 8px 12px;
    text-align: left;
    text-transform: uppercase;
  }
  thead th:not(:first-child) { text-align: center; }
  tbody tr { border-bottom: 1px solid var(--border); }
  tbody tr:hover { background: var(--surface); }
  tbody tr.special-row { background: rgba(244, 196, 48, 0.06); }
  tbody tr.special-row:hover { background: rgba(244, 196, 48, 0.1); }
  td { padding: 10px 12px; font-size: 0.85rem; }
  .match-teams { color: var(--text); font-weight: 500; }
  .match-teams .vs { color: var(--muted); font-size: 0.75rem; margin: 0 4px; }
  .match-label { color: var(--muted); font-size: 0.7rem; margin-top: 2px; }
  .date-chip {
    display: inline-block;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--muted);
    font-size: 0.62rem;
    padding: 1px 7px;
    margin-left: 6px;
    white-space: nowrap;
    vertical-align: middle;
    font-weight: 500;
    letter-spacing: 0.01em;
  }
  .special-badge { font-size: 0.65rem; color: var(--yellow); margin-left: 4px; }
  .result-cell { text-align: center; }
  .score-box {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 60px;
  }
  .score { font-weight: 700; font-size: 0.9rem; padding: 2px 6px; border-radius: 4px; }
  .score.exact { background: rgba(45, 198, 83, 0.2); color: var(--green); }
  .score.result-only { position: relative; }
  .score.result-only::before { content: "●"; color: var(--green); font-size: 0.5rem; vertical-align: middle; margin-right: 3px; }
  .pts-badge {
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 3px;
    font-weight: 600;
  }
  .pts-earned { color: var(--green); font-size: 0.7rem; font-weight: 600; }
  .pts-3 { background: #1a4a2a; color: var(--green); }
  .pts-2 { background: #3a3010; color: var(--yellow); }
  .pts-1 { background: #2a1a1a; color: #e05050; }
  .pts-0 { background: transparent; color: var(--muted); }
  .real-score { font-size: 0.8rem; text-align: center; }
  .real-score.pending { color: var(--muted); font-style: italic; }
  .real-score.finished { font-weight: 700; color: var(--text); }
  .no-picks-cell { color: var(--muted); font-style: italic; font-size: 0.8rem; text-align: center; }

  /* Live game animation */
  @keyframes blink-live {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.25; }
  }
  .live-score {
    color: var(--accent) !important;
    font-weight: 700;
    animation: blink-live 2s ease-in-out infinite;
  }
  .live-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 4px;
    animation: blink-live 1.2s ease-in-out infinite;
    vertical-align: middle;
  }
  .live-label {
    color: var(--accent);
    font-weight: 700;
    font-size: 0.82rem;
    letter-spacing: 0.03em;
    animation: blink-live 1.5s ease-in-out infinite;
  }

  .ko-table { margin-bottom: 24px; }
  .ko-match-row td:first-child { width: 210px; }
  .bracket-label { font-size: 0.78rem; font-weight: 600; color: var(--text); }
  .bracket-sub   { font-size: 0.68rem; color: var(--muted); margin-top: 2px; }
  .ko-fixture { font-size: 0.78rem; margin-top: 3px; display: flex; align-items: center; gap: 4px; justify-content: center; flex-wrap: wrap; }
  .ko-team { padding: 1px 5px; border-radius: 3px; white-space: nowrap; }
  .ko-team.pick-winner { color: var(--yellow); font-weight: 700; }
  .ko-team.pick-loser  { color: var(--muted); }
  .ko-team.correct     { background: rgba(45,198,83,0.15); color: var(--green); font-weight: 700; }
  .ko-team.wrong-pick  { background: rgba(230,57,70,0.15); color: var(--accent); font-weight: 700; }
  .ko-team.wrong-team  { color: var(--muted); }

  .extras-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 12px;
  }
  .extra-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .extra-card .extra-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .extra-row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; font-size: 0.85rem; }
  .extra-row .p-name { color: var(--muted); font-size: 0.75rem; }
  .extra-row .p-pick { font-weight: 600; }
  .extra-row .no-pick { color: var(--muted); font-style: italic; font-size: 0.75rem; }
  .extra-pts { font-size: 0.7rem; padding: 1px 6px; border-radius: 3px; font-weight: 600; }
  .extra-pts.correct { background: #1a4a2a; color: var(--green); }
  .extra-pts.wrong { background: #2a1a1a; color: #e05050; }
  .extra-pts.pending { background: var(--surface2); color: var(--muted); }

  /* Standings */
  .standings-label {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    margin: 18px 0 8px; padding-left: 2px;
  }
  .standings-table { width: 100%; border-collapse: collapse; }
  .standings-table thead th {
    background: #11162a;
    color: var(--muted); font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.08em; padding: 7px 12px;
    text-align: left; text-transform: uppercase;
  }
  .standings-table thead th.center { text-align: center; }
  .standings-table tbody tr { border-bottom: 1px solid var(--border); }
  .standings-table tbody tr:hover { background: var(--surface); }
  .standings-table td { padding: 8px 12px; font-size: 0.83rem; vertical-align: middle; }
  .pos-col { width: 36px; text-align: center; }
  .pos-num {
    background: var(--surface2); border-radius: 4px;
    font-size: 0.73rem; font-weight: 700; padding: 2px 7px;
    display: inline-block;
  }
  .std-real { display: flex; align-items: center; gap: 7px; }
  .std-pts {
    background: var(--surface2); border-radius: 4px;
    color: var(--gold); font-size: 0.65rem; font-weight: 700;
    padding: 1px 5px; white-space: nowrap;
  }
  .std-pts.partial { color: var(--yellow); }
  .std-pts.empty { color: var(--muted); }
  .std-participant { text-align: center; }
  .std-participant .team-inner { display: inline-block; font-size: 0.8rem; }
  .std-correct { color: var(--green); font-weight: 600; }
  .std-wrong   { color: var(--accent); }
  .std-pending { color: var(--text); }
  .std-none    { color: var(--muted); font-style: italic; }

  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem; }
  .error-msg { background: #2a1010; border: 1px solid #5a2020; border-radius: 8px; color: #e05050; margin: 20px 0; padding: 14px 18px; font-size: 0.85rem; }

  /* ── Bracket ──────────────────────────────────────────────────────────────── */
  .bracket-wrap { overflow-x: auto; padding-bottom: 24px; }
  .bracket-legend {
    display: flex; align-items: center; flex-wrap: wrap; gap: 12px;
    margin-bottom: 10px; font-size: 0.72rem;
  }
  .bracket-labels {
    display: flex; min-width: 1500px; margin-bottom: 4px;
  }
  .brl {
    flex: 1; text-align: center; font-size: 0.6rem; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 4px 2px;
  }
  .b-col.b-center .brl { color: var(--gold); }

  .bracket-body {
    display: flex; min-width: 1500px; min-height: 1440px; gap: 6px;
  }
  .b-col {
    flex: 1; display: flex; flex-direction: column; justify-content: space-around;
  }
  .b-col.b-center { flex: 1.1; }

  .b-slot {
    display: flex; justify-content: center; align-items: center; padding: 2px 0;
  }

  /* Connector lines for left columns (line extends right) */
  .b-col.b-left .b-slot { position: relative; }
  .b-col.b-left .b-slot::after {
    content: ''; position: absolute; right: -3px; top: 50%;
    width: 6px; height: 2px; background: var(--border);
  }
  /* Connector lines for right columns (line extends left) */
  .b-col.b-right .b-slot { position: relative; }
  .b-col.b-right .b-slot::after {
    content: ''; position: absolute; left: -3px; top: 50%;
    width: 6px; height: 2px; background: var(--border);
  }

  /* Match card */
  .bc {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; width: 152px; font-size: 0.72rem;
  }
  .bc.bc-done { border-color: #2a3a2a; }
  .bc.bc-live { border-color: var(--yellow); }

  .bc-id {
    font-size: 0.58rem; color: var(--muted); margin-bottom: 5px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .bc-round-pts { color: var(--gold); font-weight: 700; }

  .bc-teams { display: flex; flex-direction: column; gap: 2px; margin-bottom: 5px; }
  .bc-team {
    font-weight: 600; color: var(--text); font-size: 0.72rem;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;
  }
  .bc-team.tbd { color: var(--muted); font-style: italic; font-weight: 400; }
  .bc-vs { font-size: 0.58rem; color: var(--muted); }

  .bc-score {
    font-size: 0.68rem; padding: 2px 5px; border-radius: 4px; margin-bottom: 5px;
  }
  .bc-score.done { background: rgba(44,198,83,0.08); color: var(--green); }
  .bc-score.live-s {
    color: var(--yellow); display: flex; align-items: center; gap: 4px;
  }

  .bc-picks {
    border-top: 1px solid var(--border); padding-top: 5px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .bc-pick {
    display: flex; align-items: center; gap: 4px; font-size: 0.63rem; line-height: 1.35;
  }
  .bc-pn { color: var(--muted); font-weight: 600; min-width: 28px; font-size: 0.6rem; }
  .bc-pw {
    color: var(--text); flex: 1;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .bc-pw.tbd { color: var(--muted); font-style: italic; }

  .bc-pick.ok .bc-pn  { color: var(--green); }
  .bc-pick.ok .bc-pw  { color: var(--green); font-weight: 600; }
  .bc-pick.ko .bc-pn  { color: var(--accent); }
  .bc-pick.ko .bc-pw  { color: var(--muted); text-decoration: line-through; }

  .bc-pts {
    color: var(--gold); font-weight: 700; font-size: 0.58rem;
    background: rgba(244,161,0,0.12); padding: 0 3px; border-radius: 3px;
    white-space: nowrap;
  }

  /* ── Honor table ──────────────────────────────────────────────────────────── */
  .honor-section {
    margin-top: 32px; border-top: 2px solid var(--border); padding-top: 20px;
  }
  .honor-title {
    font-size: 0.85rem; font-weight: 700; color: var(--gold); margin-bottom: 4px;
  }
  .honor-subtitle {
    font-size: 0.72rem; color: var(--muted); margin-bottom: 12px;
  }
  .honor-rules {
    display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 14px; font-size: 0.72rem;
  }
  .honor-rule { color: var(--muted); }
  .honor-rule strong { color: var(--gold); }
  .honor-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .honor-table th {
    text-align: left; padding: 7px 10px; font-size: 0.62rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted);
    border-bottom: 1px solid var(--border); white-space: nowrap; line-height: 1.3;
  }
  .honor-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; white-space: nowrap; }
  .honor-table tbody tr:hover { background: var(--surface); }
  .honor-participant { font-weight: 700; font-size: 0.85rem; }
  .honor-chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .h-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 500;
    background: var(--surface2); color: var(--text);
  }
  .h-chip.ok  { background: rgba(44,198,83,0.15); color: var(--green); font-weight: 700; }
  .h-chip.ko  { background: rgba(230,57,70,0.08); color: var(--muted); text-decoration: line-through; }
  .h-chip.pending { background: var(--surface2); color: var(--muted); }
  .h-pts { color: var(--gold); font-size: 0.62rem; font-weight: 700; }
  .honor-total { font-weight: 800; color: var(--gold); font-size: 1rem; }
  .honor-none { color: var(--muted); font-style: italic; font-size: 0.8rem; }

  @media (max-width: 600px) {
    header h1 { font-size: 1.1rem; }
    thead th, td { padding: 6px 8px; font-size: 0.78rem; }
    .score-box { min-width: 48px; }
  }
</style>
</head>
<body>

<header>
  <div class="flag">🏆</div>
  <div>
    <h1>Porra Mundial USA·MEX·CAN 2026</h1>
    <div class="subtitle">Marc · Eugènia · Berta · José Luis</div>
  </div>
  <div class="updated" id="lastUpdated">
    <span>Última actualización</span>
    <strong id="lastUpdatedTime">Cargando...</strong>
  </div>
</header>

<div class="leaderboard" id="leaderboard">
  <div class="section-title">Clasificación</div>
  <div class="lb-grid" id="lbGrid"><div class="loading">Calculando puntos...</div></div>
</div>

<nav id="stageNav"></nav>
<div class="content" id="content"><div class="loading">Cargando datos...</div></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
const PARTICIPANTS = ["Berta", "Marc", "Eugènia", "José Luis"];
const PICKS_FILES  = {
  "Berta":     "data/picks/berta.json",
  "Marc":      "data/picks/marc.json",
  "Eugènia":   "data/picks/eugenia.json",
  "José Luis": "data/picks/jose_luis.json",
};
const RESULTS_FILE  = "data/results.json";
const SCHEDULE_FILE = "data/schedule.json";

const STAGES = [
  { key: "group",    label: "Fase de grupos" },
  { key: "knockout", label: "Fase eliminatoria" },
];

// Points per round – winner only
const KO_WINNER_POINTS = {
  "Round of 32":   5,
  "Round of 16":   10,
  "Quarter-final": 15,
  "Semi-final":    25,
  "Final":         50,
};

// Stage name for each bracket match ID
const MATCH_STAGE = {
  "R32-1":"Round of 32","R32-2":"Round of 32","R32-3":"Round of 32","R32-4":"Round of 32",
  "R32-5":"Round of 32","R32-6":"Round of 32","R32-7":"Round of 32","R32-8":"Round of 32",
  "R32-9":"Round of 32","R32-10":"Round of 32","R32-11":"Round of 32","R32-12":"Round of 32",
  "R32-13":"Round of 32","R32-14":"Round of 32","R32-15":"Round of 32","R32-16":"Round of 32",
  "R16-1":"Round of 16","R16-2":"Round of 16","R16-3":"Round of 16","R16-4":"Round of 16",
  "R16-5":"Round of 16","R16-6":"Round of 16","R16-7":"Round of 16","R16-8":"Round of 16",
  "QF-1":"Quarter-final","QF-2":"Quarter-final","QF-3":"Quarter-final","QF-4":"Quarter-final",
  "SF-1":"Semi-final","SF-2":"Semi-final",
  "Final":"Final",
};

// Which matches feed into each bracket slot
// Verified against printwcbracket.com PDF structure:
// Left side: M90=R16-2[R32-1,R32-2], M89=R16-1[R32-3,R32-5]
//            M91=R16-3[R32-4,R32-6], M92=R16-4[R32-7,R32-8]
// Right side: M93=R16-5[R32-11,R32-12], M94=R16-6[R32-9,R32-10]
//             M96=R16-7[R32-13,R32-16], M95=R16-8[R32-14,R32-15]
// QF: M97=QF-1[R16-1,R16-2], M98=QF-2[R16-5,R16-6]
//     M99=QF-3[R16-3,R16-4], M100=QF-4[R16-7,R16-8]
// SF: M101=SF-1[QF-1,QF-2] (cross!), M102=SF-2[QF-3,QF-4]
const BRACKET_FEEDERS = {
  "R16-2":["R32-1","R32-2"],  "R16-1":["R32-3","R32-5"],
  "R16-3":["R32-4","R32-6"],  "R16-4":["R32-7","R32-8"],
  "R16-5":["R32-11","R32-12"],"R16-6":["R32-9","R32-10"],
  "R16-7":["R32-13","R32-16"],"R16-8":["R32-14","R32-15"],

// ── Load data ────────────────────────────────────────────────────────────────
async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function init() {
  const sched = await fetchJSON(SCHEDULE_FILE);
  if (sched?.matches) schedule = sched.matches;

  const res = await fetchJSON(RESULTS_FILE);
  if (res) results = res;

  for (const p of PARTICIPANTS) {
    const data = await fetchJSON(PICKS_FILES[p]);
    if (data) picksData[p] = data;
  }

  renderLeaderboard();
  buildNav();
  renderStage(activeStage);

  const timeEl = document.getElementById("lastUpdatedTime");
  if (results.last_updated) {
    timeEl.textContent = new Date(results.last_updated).toLocaleString("es-ES", {
      timeZone: "Europe/Madrid", dateStyle: "short", timeStyle: "short"
    });
  } else {
    timeEl.textContent = "Sin resultados aún";
  }
}

// ── Auto-refresh results every 60s ───────────────────────────────────────────
async function refreshResults() {
  const res = await fetchJSON(RESULTS_FILE + "?_t=" + Date.now());
  if (res) {
    results = res;
    renderLeaderboard();
    renderStage(activeStage);
    const timeEl = document.getElementById("lastUpdatedTime");
    if (results.last_updated) {
      timeEl.textContent = new Date(results.last_updated).toLocaleString("es-ES", {
        timeZone: "Europe/Madrid", dateStyle: "short", timeStyle: "short"
      });
    }
  }
}
setInterval(refreshResults, 60000);

// ── Date formatting ──────────────────────────────────────────────────────────
function fmtDate(utcDate) {
  if (!utcDate) return "";
  const d = new Date(utcDate);
  const day  = d.toLocaleDateString("es-ES", { timeZone: "Europe/Madrid", day: "numeric", month: "short" });
  const cet  = d.toLocaleTimeString("es-ES", { timeZone: "Europe/Madrid",   hour: "2-digit", minute: "2-digit" });
  const et   = d.toLocaleTimeString("es-ES", { timeZone: "America/New_York", hour: "2-digit", minute: "2-digit" });
  return `${day} · ${cet} CET · ${et} ET`;
}

function matchDate(matchId, result) {
  return result?.utc_date || schedule[matchId] || null;
}

// ── Results lookup ───────────────────────────────────────────────────────────
// Returns true if a match is currently in progress based purely on schedule time.
// Used to show "En vivo" when status is still TIMED (score not yet updated manually).
function isInferredLive(result) {
  if (!result) return false;
  if (result.status === "FINISHED" || result.status === "IN_PLAY" || result.status === "PAUSED") return false;
  if (!result.utc_date) return false;
  const now = Date.now();
  const kickoff = new Date(result.utc_date).getTime();
  return now >= kickoff; // show from kickoff until status becomes FINISHED
}

function findResult(homeEs, awayEs) {
  return results.matches.find(m =>
    (m.home_team_es === homeEs && m.away_team_es === awayEs) ||
    (m.home_team_es === awayEs && m.away_team_es === homeEs)
  ) || null;
}

// ── Scoring ──────────────────────────────────────────────────────────────────
function scoreGroupMatch(pick, result, matchId) {
  const live = result?.status === "IN_PLAY" || result?.status === "PAUSED";
  if (!result || (!live && result.status !== "FINISHED") || result.home_goals === null) return null;

  const isSpecial = SPECIAL_MATCH_IDS.has(matchId);
  const [ph, pa] = [pick.predicted_home, pick.predicted_away];
  let [rh, ra] = [result.home_goals, result.away_goals];

  if (result.home_team_es === pick.away_team) [rh, ra] = [ra, rh];

  const correctScore  = ph === rh && pa === ra;
  const correctResult = Math.sign(ph - pa) === Math.sign(rh - ra);

  if (isSpecial) {
    if (correctScore)  return 6; // 3pts (1X2) + 3pts (marcador) = 6 total
    if (correctResult) return 3; // 3pts for 1X2 only
    return 0;
  } else {
    if (correctScore)  return 4; // 3pts (marcador exacto) + 1pt (1X2) = 4 total
    if (correctResult) return 1;
    return 0;
  }
}

// Standings scoring: 4pts exact position, 1pt adjacent (1↔2 or 3↔4)
function scoreStandingsPosition(predictedTeam, realStandings, predictedPos) {
  if (!predictedTeam || !realStandings.length) return null;
  const realPos = realStandings.findIndex(t => t.name === predictedTeam);
  if (realPos === -1) return null; // not all games played yet
  if (realPos === predictedPos) return 4;
  const adjacent = predictedPos % 2 === 0 ? predictedPos + 1 : predictedPos - 1;
  if (realPos === adjacent) return 1;
  return 0;
}

function scoreKnockoutMatch(pick, result) {
  if (!result || result.status !== "FINISHED" || !result.winner_es) return null;
  if (result.winner_es !== pick.predicted_winner) return 0;
  return KO_WINNER_POINTS[pick.stage] ?? 5;
}

function calcTotalPoints(participant) {
  const picks = picksData[participant];
  if (!picks) return null;
  let total = 0;

  for (const m of picks.group_matches) {
    const r = findResult(m.home_team, m.away_team);
    if (r?.status !== "FINISHED") continue; // only count confirmed results
    const pts = scoreGroupMatch(m, r, m.match_id);
    if (pts !== null) total += pts;
  }
  for (const m of picks.knockout_matches) {
    const r = findResult(m.home_team, m.away_team);
    if (r?.status !== "FINISHED") continue; // only count confirmed results
    const pts = scoreKnockoutMatch(m, r);
    if (pts !== null) total += pts;
  }

  // Standings scoring per group
  const ref = picksData["Berta"] || Object.values(picksData)[0];
  if (ref) {
    const groups = {};
    for (const m of ref.group_matches) {
      if (!groups[m.group]) groups[m.group] = [];
      groups[m.group].push(m);
    }
    for (const groupMatches of Object.values(groups)) {
      const realMatchList = groupMatches.map(m => {
        const r = findResult(m.home_team, m.away_team);
        if (r && r.home_team_es === m.away_team)
          return { home_team: m.home_team, away_team: m.away_team, home_goals: r.away_goals, away_goals: r.home_goals };
        return { home_team: m.home_team, away_team: m.away_team, home_goals: r?.home_goals ?? null, away_goals: r?.away_goals ?? null };
      });
      const finished = realMatchList.filter(m => m.home_goals !== null).length;
      if (finished < 6) continue; // only score when group is complete
      const realStandings = calculateStandings(realMatchList);
      const pMatches = groupMatches.map(m => {
        const pm = picks.group_matches.find(pm => pm.match_id === m.match_id);
        return pm
          ? { home_team: pm.home_team, away_team: pm.away_team, home_goals: pm.predicted_home, away_goals: pm.predicted_away }
          : { home_team: m.home_team, away_team: m.away_team, home_goals: null, away_goals: null };
      });
      const pStandings = calculateStandings(pMatches);
      for (let i = 0; i < 4; i++) {
        const pts = scoreStandingsPosition(pStandings[i]?.name, realStandings, i);
        if (pts !== null) total += pts;
      }
    }
  }

  return total;
}

// ── Leaderboard ──────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const ranked = PARTICIPANTS
    .map(p => ({ name: p, pts: calcTotalPoints(p), hasPicks: !!picksData[p] }))
    .sort((a, b) => (b.pts ?? -1) - (a.pts ?? -1));

  const medals = ["🥇", "🥈", "🥉", ""];
  const grid = document.getElementById("lbGrid");
  grid.innerHTML = ranked.map((p, i) => {
    const champion = picksData[p.name]?.champion ?? null;
    return `
    <div class="lb-card ${p.hasPicks ? `rank-${i+1}` : ""}">
      <div class="badge">${medals[Math.min(i, 3)]}</div>
      <div class="rank">#${i+1}</div>
      <div class="name">${p.name}</div>
      ${p.hasPicks
        ? `<div class="points">${p.pts}</div><div class="pts-label">puntos</div>
           ${champion ? `<div class="champion-pick">🏆 ${champion}</div>` : ""}`
        : `<div class="no-picks">Sin picks aún</div>`
      }
    </div>`;
  }).join("");
}

// SF-2 (M102) cross-bracket: W(QF-3/left-bot) vs W(QF-4/right-bot)
const BRACKET_LAYOUT = [
  { label:"Dieciseisavos", ids:["R32-1","R32-2","R32-3","R32-5","R32-4","R32-6","R32-7","R32-8"], side:"left" },
  { label:"Octavos",       ids:["R16-2","R16-1","R16-3","R16-4"],                                  side:"left" },

  { label:"Octavos",       ids:["R16-5","R16-6","R16-7","R16-8"],                                  side:"right" },

];

// Recursively resolve real teams for any bracket slot
function getMatchTeams(matchId) {
  if (REAL_R32_TEAMS[matchId]) return { ...REAL_R32_TEAMS[matchId] };
  const feeders = BRACKET_FEEDERS[matchId];
  if (!feeders) return { home: "TBD", away: "TBD" };
  const win = (fId) => {
    const t = getMatchTeams(fId);
    if (t.home === "TBD" || t.away === "TBD") return "TBD";
    return findResult(t.home, t.away)?.winner_es || "TBD";
  };
  return { home: win(feeders[0]), away: win(feeders[1]) };
}

function renderBracketCard(matchId) {
  const stage  = MATCH_STAGE[matchId];
  const pts    = KO_WINNER_POINTS[stage] || 5;
  const teams  = getMatchTeams(matchId);
  const { home, away } = teams;
  const isTBD  = home === "TBD" || away === "TBD";
  const result = !isTBD ? findResult(home, away) : null;
  const isLive     = result?.status === "IN_PLAY" || result?.status === "PAUSED" || isInferredLive(result);
  const isFinished = result?.status === "FINISHED";

  // Score line
  let scoreHtml = "";
  if (isFinished) {
    scoreHtml = `<div class="bc-score done">${result.home_goals}–${result.away_goals} &middot; <strong>${result.winner_es}</strong></div>`;
  } else if (isLive) {
    scoreHtml = `<div class="bc-score live-s"><span class="live-dot"></span>${result?.home_goals ?? 0}–${result?.away_goals ?? 0}</div>`;
  }

  // Per-participant picks
  const picksHtml = PARTICIPANTS.map(p => {
    const km = picksData[p]?.knockout_matches?.find(m => m.match_id === matchId);
    if (!km) return `<div class="bc-pick"><span class="bc-pn">${p}</span><span class="bc-pw tbd">—</span></div>`;
    const winner = km.predicted_winner || "?";
    let cls = "", pLabel = "";
    if (isFinished && result.winner_es) {
      if (result.winner_es === winner) { cls = "ok";  pLabel = `<span class="bc-pts">+${pts}p</span>`; }
      else                              { cls = "ko"; }
    }
    return `<div class="bc-pick ${cls}"><span class="bc-pn">${p}</span><span class="bc-pw">${winner}</span>${pLabel}</div>`;
  }).join("");

  const cardCls = isFinished ? "bc bc-done" : isLive ? "bc bc-live" : "bc";
  const matchLabel = matchId.startsWith("Final") ? "Final" : matchId;

  return `<div class="${cardCls}">
    <div class="bc-id">${matchLabel} <span class="bc-round-pts">${pts}pts</span></div>
    <div class="bc-teams">
      <span class="bc-team${isTBD&&home==='TBD'?' tbd':''}">${home}</span>
      <span class="bc-vs">vs</span>
      <span class="bc-team${isTBD&&away==='TBD'?' tbd':''}">${away}</span>
    </div>
    ${scoreHtml}
    <div class="bc-picks">${picksHtml}</div>
  </div>`;
}

function renderBracket() {
  const labelsHtml = BRACKET_LAYOUT.map(col =>
    `<div class="brl">${col.label}</div>`
  ).join("");

  const colsHtml = BRACKET_LAYOUT.map(col => {
    const slots = col.ids.map(id =>
      `<div class="b-slot">${renderBracketCard(id)}</div>`
    ).join("");
    return `<div class="b-col b-${col.side}">${slots}</div>`;
  }).join("");

  return `<div class="bracket-wrap">
    <div class="bracket-legend">
      <span class="legend-item"><span class="legend-dot exact" style="background:var(--green)"></span> Acertaste el ganador</span>
      <span class="legend-item"><span class="legend-dot result" style="background:var(--accent)"></span> Fallaste</span>
      <span class="legend-item" style="margin-left:auto;color:var(--muted);font-size:0.72rem">Desplaza → para ver todo el cuadro</span>
    </div>
    <div class="bracket-labels">${labelsHtml}</div>
    <div class="bracket-body">${colsHtml}</div>
  </div>
  ${renderHonorTable()}`;
}

// ── Honor table ───────────────────────────────────────────────────────────────
function renderHonorTable() {
  // ── Real results ────────────────────────────────────────────────────────────
  const finTeams  = getMatchTeams("Final");
  function validTeam(t) { return t && t !== "TBD"; }

  // Real champion = winner of Final result; runner-up = the other team
  const finalResult = validTeam(finTeams.home) ? findResult(finTeams.home, finTeams.away) : null;
  const realChampion = finalResult?.winner_es ?? null;
  const realRunnerUp = realChampion && finTeams.home && finTeams.away
    ? (finTeams.home === realChampion ? finTeams.away : finTeams.home)
    : null;

  // Real 3rd-place winner
  function getReal3rd() {
    const matches = results?.matches;
    if (!matches) return null;
    const m3 = matches.find(r =>
      r.stage === "3rd Place Final" || r.stage === "3rd" ||
      (r.stage && r.stage.toLowerCase().includes("third"))
    );
    return m3?.winner_es ?? null;
  }
  const real3rd = getReal3rd();

  // ── Extra awards (from results.extras, set manually after tournament) ───────
  const EXTRAS = [
    { key: "bota_oro",     label: "⚽ Bota de Oro",    pts: 10 },
    { key: "bota_plata",   label: "⚽ Bota de Plata",  pts: 10 },
    { key: "bota_bronce",  label: "⚽ Bota de Bronce", pts: 10 },
    { key: "balon_oro",    label: "🌟 Balón de Oro",   pts: 10 },
    { key: "balon_plata",  label: "🌟 Balón de Plata", pts: 10 },
    { key: "balon_bronce", label: "🌟 Balón de Bronce",pts: 10 },
  ];

  // ── Chip renderer ────────────────────────────────────────────────────────────
  function chip(value, isCorrect, known, ptsVal) {
    if (!value) return `<span class="honor-none">—</span>`;
    const cls = !known ? 'pending' : (isCorrect ? 'ok' : 'ko');
    const ptsLabel = isCorrect && known ? `<span class="h-pts"> +${ptsVal}</span>` : '';
    return `<span class="h-chip ${cls}">${value}${ptsLabel}</span>`;
  }

  // ── Rows ─────────────────────────────────────────────────────────────────────
  const rows = PARTICIPANTS.map(name => {
    const pData = picksData[name] || {};
    const koMatches = pData.knockout_matches || [];
    const extras    = pData.extras || {};

    const finalPick = koMatches.find(m => m.match_id === "Final");
    const p3Pick    = koMatches.find(m => m.match_id === "3rd");

    // Predicted champion = predicted_winner of Final
    const predChampion = finalPick?.predicted_winner ?? null;
    // Predicted runner-up = the Final team that is NOT the predicted winner
    const predRunnerUp = finalPick
      ? ([finalPick.home_team, finalPick.away_team].find(t => t && t !== predChampion) ?? null)
      : null;
    const pred3rd = p3Pick?.predicted_winner ?? null;

    // Points
    let pts = 0;
    const champKnown   = realChampion !== null;
    const runnerKnown  = realRunnerUp !== null;
    const p3rdKnown    = real3rd !== null;

    const champOk  = champKnown  && predChampion === realChampion;
    const runnerOk = runnerKnown && predRunnerUp === realRunnerUp;
    const p3Ok     = p3rdKnown   && pred3rd === real3rd;

    if (champOk)  pts += 20;
    if (runnerOk) pts += 10;
    if (p3Ok)     pts += 5;

    // Extra cells + points
    const extraCells = EXTRAS.map(ex => {
      const realVal  = results.extras?.[ex.key] ?? null;
      const predVal  = extras[ex.key] ?? null;
      const known    = realVal !== null;
      const isCorrect = known && predVal && predVal.trim().toLowerCase() === realVal.trim().toLowerCase();
      if (isCorrect) pts += ex.pts;
      return `<td>${chip(predVal, isCorrect, known, ex.pts)}</td>`;
    }).join('');

    const anyKnown = champKnown || runnerKnown || p3rdKnown || EXTRAS.some(ex => results.extras?.[ex.key]);

    return `<tr>
      <td><span class="honor-participant">${name}</span></td>
      <td>${chip(predChampion, champOk, champKnown, 20)}</td>
      <td>${chip(predRunnerUp, runnerOk, runnerKnown, 10)}</td>
      <td>${chip(pred3rd, p3Ok, p3rdKnown, 5)}</td>
      ${extraCells}
      <td><span class="honor-total">${anyKnown ? pts : '—'}</span></td>
    </tr>`;
  });

  // ── Header ───────────────────────────────────────────────────────────────────
  const extraHeaders = EXTRAS.map(ex => `<th>${ex.label}<br><span style="font-weight:400;color:var(--gold)">+${ex.pts}pts</span></th>`).join('');

  return `<div class="honor-section">
    <div class="honor-title">🏅 Puntos honorarios por predicción al principio del campeonato</div>
    <div class="honor-subtitle">Basado en las predicciones originales antes del torneo</div>
    <div class="honor-rules">
      <span class="honor-rule"><strong>+20 pts</strong> por campeón acertado</span>
      <span class="honor-rule"><strong>+10 pts</strong> por segundo lugar acertado</span>
      <span class="honor-rule"><strong>+5 pts</strong> por tercer lugar acertado</span>
      <span class="honor-rule"><strong>+10 pts</strong> por cada premio individual acertado</span>
    </div>
    <div style="overflow-x:auto">
    <table class="honor-table">
      <thead>
        <tr>
          <th>Participante</th>
          <th>🥇 Campeón<br><span style="font-weight:400;color:var(--gold)">+20pts</span></th>
          <th>🥈 Segundo<br><span style="font-weight:400;color:var(--gold)">+10pts</span></th>
          <th>🥉 Tercero<br><span style="font-weight:400;color:var(--gold)">+5pts</span></th>
          ${extraHeaders}
          <th>Total extra</th>
        </tr>
      </thead>
      <tbody>${rows.join('')}</tbody>
    </table>
    </div>
  </div>`;
}

// ── Group standings ───────────────────────────────────────────────────────────
function calculateStandings(matchList) {
  const teams = {};
  for (const m of matchList) {
    if (!teams[m.home_team]) teams[m.home_team] = { name: m.home_team, pts: 0, gf: 0, gc: 0, played: 0 };
    if (!teams[m.away_team]) teams[m.away_team] = { name: m.away_team, pts: 0, gf: 0, gc: 0, played: 0 };
    const hg = m.home_goals, ag = m.away_goals;
    if (hg === null || hg === undefined || ag === null || ag === undefined) continue;
    const h = teams[m.home_team], a = teams[m.away_team];
    h.played++; a.played++;
    h.gf += hg; h.gc += ag;
    a.gf += ag; a.gc += hg;
    if (hg > ag) h.pts += 3;
    else if (ag > hg) a.pts += 3;
    else { h.pts += 1; a.pts += 1; }
  }
  return Object.values(teams).sort((a, b) => {
    if (b.pts !== a.pts) return b.pts - a.pts;
    const dg = (b.gf - b.gc) - (a.gf - a.gc);
    if (dg !== 0) return dg;
    return b.gf - a.gf;
  });
}

function renderGroupStandings(baseMatches) {
  const realMatchList = baseMatches.map(m => {
    const r = findResult(m.home_team, m.away_team);
    if (r && r.home_team_es === m.away_team) {
      return { home_team: m.home_team, away_team: m.away_team, home_goals: r.away_goals, away_goals: r.home_goals };
    }
    return { home_team: m.home_team, away_team: m.away_team, home_goals: r?.home_goals ?? null, away_goals: r?.away_goals ?? null };
  });

  const finishedCount = realMatchList.filter(m => m.home_goals !== null).length;
  const allDone = finishedCount === 6;
  const realStandings = calculateStandings(realMatchList);

  const participantStandings = {};
  for (const p of PARTICIPANTS) {
    const picks = picksData[p];
    if (!picks) { participantStandings[p] = null; continue; }
    const pList = baseMatches.map(m => {
      const pm = picks.group_matches.find(pm => pm.match_id === m.match_id);
      return pm
        ? { home_team: pm.home_team, away_team: pm.away_team, home_goals: pm.predicted_home, away_goals: pm.predicted_away }
        : { home_team: m.home_team, away_team: m.away_team, home_goals: null, away_goals: null };
    });
    participantStandings[p] = calculateStandings(pList);
  }

  // Scoring legend for standings
  let html = `<div class="standings-label">Clasificación del grupo</div>
  <div class="pts-legend" style="margin-bottom:8px">
    <span class="legend-item"><span class="legend-dot exact"></span> Posición exacta: 4pts</span>
    <span class="legend-item"><span class="legend-dot result"></span> Posición adyacente (1↔2 o 3↔4): 1pt</span>
  </div>
  <table class="standings-table"><thead><tr>
    <th class="pos-col">Pos</th>
    <th>Clasificación real${finishedCount > 0 && !allDone ? " *parcial" : ""}</th>
    ${PARTICIPANTS.map(p => `<th class="center">${p}</th>`).join("")}
  </tr></thead><tbody>`;

  for (let i = 0; i < 4; i++) {
    const realTeam = realStandings[i];
    html += `<tr>`;
    html += `<td class="pos-col"><span class="pos-num">${i+1}</span></td>`;
    html += `<td><div class="std-real">
      <span>${realTeam?.name ?? "—"}</span>
      ${finishedCount > 0 && realTeam
        ? `<span class="std-pts ${allDone ? "" : "partial"}">${realTeam.pts}pts</span>`
        : `<span class="std-pts empty">—</span>`}
    </div></td>`;

    for (const p of PARTICIPANTS) {
      const pStandings = participantStandings[p];
      if (!pStandings) { html += `<td class="std-participant"><span class="std-none">—</span></td>`; continue; }
      const pTeam = pStandings[i];
      const standPts = allDone ? scoreStandingsPosition(pTeam?.name, realStandings, i) : null;
      const correct = standPts === 4;
      const partial = standPts === 1;
      const wrong   = standPts === 0;
      const cls = correct ? "std-correct" : partial ? "std-pending" : wrong ? "std-wrong" : "std-pending";
      html += `<td class="std-participant">
        <span class="team-inner ${cls}">${pTeam?.name ?? "?"}</span>
        ${standPts !== null ? `<br><span class="pts-earned">${standPts > 0 ? "+" : ""}${standPts}pts</span>` : ""}
      </td>`;
    }

    html += `</tr>`;
  }

  html += `</tbody></table>`;
  return html;
}

function renderGroupStage() {
  const ref = picksData["Berta"] || Object.values(picksData)[0];
  if (!ref) return `<div class="error-msg">No hay picks disponibles todavía.</div>`;

  const groups = {};
  for (const m of ref.group_matches) {
    if (!groups[m.group]) groups[m.group] = [];
    groups[m.group].push(m);
  }

  let html = "";
  for (const [g, matches] of Object.entries(groups)) {
    const hasSpecial = matches.some(m => SPECIAL_MATCH_IDS.has(m.match_id));

    html += `<div class="group-section">
    <div class="group-header"><span class="group-tag">Grupo ${g}</span></div>`;

    // Legend below group tag
    html += `<div class="pts-legend">
      <span class="legend-item"><span class="legend-dot exact"></span> Marcador exacto: 3pts</span>
      <span class="legend-item"><span class="legend-dot result"></span> Acertar 1X2: 1pt</span>
      ${hasSpecial ? `<span class="legend-special">⭐ Partido especial - 6 puntos (Marcador exacto: 3pts · Acertar 1X2: 3pts)</span>` : ""}
    </div>`;

    html += `<table><thead><tr>
      <th>Partido</th>
      <th>Real</th>
      ${PARTICIPANTS.map(p => `<th>${p}</th>`).join("")}
    </tr></thead><tbody>`;

    for (const baseMatch of matches) {
      const isSpecial = SPECIAL_MATCH_IDS.has(baseMatch.match_id);
      const result = findResult(baseMatch.home_team, baseMatch.away_team);

      // Real score cell
      let realCell;
      if (result?.status === "FINISHED") {
        realCell = `<td class="real-score finished">${result.home_goals}-${result.away_goals}</td>`;
      } else if (result?.status === "IN_PLAY" || result?.status === "PAUSED") {
        realCell = `<td class="real-score"><span class="live-dot"></span><span class="live-score">${result.home_goals ?? 0}-${result.away_goals ?? 0}</span></td>`;
      } else if (isInferredLive(result)) {
        realCell = `<td class="real-score"><span class="live-dot"></span><span class="live-label">En vivo</span></td>`;
      } else {
        realCell = `<td class="real-score pending">—</td>`;
      }

      const dateStr = fmtDate(matchDate(baseMatch.match_id, result));
      html += `<tr class="${isSpecial ? "special-row" : ""}">
        <td class="match-teams">
          ${baseMatch.home_team} <span class="vs">vs</span> ${baseMatch.away_team}
          ${isSpecial ? `<span class="special-badge">⭐</span>` : ""}
          ${dateStr ? `<span class="date-chip">${dateStr}</span>` : ""}
        </td>${realCell}`;

      for (const p of PARTICIPANTS) {
        const pm = picksData[p]?.group_matches?.find(m => m.match_id === baseMatch.match_id);
        if (!pm) { html += `<td class="no-picks-cell">—</td>`; continue; }

        const pts = scoreGroupMatch(pm, result, baseMatch.match_id);
        const maxPts = isSpecial ? 6 : 4;

        // Determine score class
        let scoreClass = "";
        if (pts !== null) {
          if (pts === maxPts) scoreClass = "exact";
          else if (pts > 0) scoreClass = "result-only";
        }

        html += `<td class="result-cell"><div class="score-box">
          <span class="score ${scoreClass}">${pm.predicted_home ?? "?"}-${pm.predicted_away ?? "?"}</span>
          ${pts !== null ? (pts === 4 && !isSpecial ? `<span class="pts-earned">+3pts +1pt</span>` : `<span class="pts-earned">${pts > 0 ? "+" : ""}${pts}pts</span>`) : ""}
        </div></td>`;
      }

      html += `</tr>`;
    }

    html += `</tbody></table>`;
    html += renderGroupStandings(matches);
    html += `</div>`;
  }
  return html;
}

function renderExtras() {
  const extraItems = [
    { key: "bota_oro",     label: "⚽ Bota de Oro",     subtitle: "Máximo goleador" },
    { key: "bota_plata",   label: "⚽ Bota de Plata",   subtitle: "2º máximo goleador" },
    { key: "bota_bronce",  label: "⚽ Bota de Bronce",  subtitle: "3º máximo goleador" },
    { key: "balon_oro",    label: "🌟 Balón de Oro",    subtitle: "Mejor jugador" },
    { key: "balon_plata",  label: "🌟 Balón de Plata",  subtitle: "2º mejor jugador" },
    { key: "balon_bronce", label: "🌟 Balón de Bronce", subtitle: "3º mejor jugador" },
  ];

  let html = `<div class="group-section">
    <div class="group-header"><span class="group-tag">Premios individuales</span></div>
    <div class="pts-legend" style="margin-bottom:10px">
      <span style="color:var(--gold);font-weight:600">10 puntos por extra acertado</span>
    </div>
  <div class="extras-grid">`;

  for (const item of extraItems) {
    // Real winner from results.json (manually added as results.extras.balon_oro etc.)
    const realWinner = results.extras?.[item.key] ?? null;

    html += `<div class="extra-card">
      <div class="extra-label">${item.label}</div>
      <div style="font-size:0.7rem;color:var(--muted);margin-bottom:10px">${item.subtitle}${realWinner ? ` · <span style="color:var(--gold)">${realWinner}</span>` : " · por decidir"}</div>`;

    for (const p of PARTICIPANTS) {
      const pick = picksData[p]?.extras?.[item.key];
      if (!pick) {
        html += `<div class="extra-row"><span class="p-name">${p}</span><span class="no-pick">Sin pick</span></div>`;
        continue;
      }
      const correct = realWinner && pick.trim().toLowerCase() === realWinner.trim().toLowerCase();
      const decided = realWinner !== null;
      html += `<div class="extra-row">
        <span class="p-name">${p}</span>
        <span class="p-pick" style="${correct ? "color:var(--green);font-weight:700" : decided ? "color:var(--muted)" : "color:var(--text)"}">${pick}</span>
        ${correct ? `<span class="extra-pts correct">+10pts</span>` : ""}
      </div>`;
    }
    html += `</div>`;
  }

  html += `</div></div>`;
  return html;
}

init();
</script>
